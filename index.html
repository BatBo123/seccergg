<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>체코 (Che-Co) : AI 체대 입시 코치</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .calculator {
      width: 360px;
      padding: 24px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin: 0 0 5px;
      text-align: center;
      font-size: 24px;
      color: #333;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }

    /* Auth Section */
    .auth-section {
      margin-bottom: 15px;
      text-align: center;
    }
    .btn-auth {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      background-color: #4285F4;
      color: white;
    }
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      background: #f0f4f8;
      padding: 8px 12px;
      border-radius: 10px;
    }
    .btn-logout {
      background: none;
      border: none;
      color: #ff4d4d;
      cursor: pointer;
      font-weight: bold;
    }

    /* Input Form */
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .input-group input {
      width: 100%;
      height: 45px;
      padding: 10px;
      border: 2px solid #edf1f5;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #f9fbfd;
      transition: 0.2s;
    }
    .input-group input:focus {
      border-color: #42a5f5;
    }

    /* Buttons */
    .btn-block {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.15s;
    }
    .btn-block:hover {
      transform: translateY(-2px);
    }
    .btn-save {
      background: #28a745;
      color: white;
    }
    .btn-ai {
      background: #6f42c1;
      color: white;
    }

    /* AI Report Section */
    .report-box {
      margin-top: 16px;
      padding: 14px;
      background: #f8f9fa;
      border-radius: 14px;
      border: 1px solid #dde5ec;
      display: none;
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .report-title {
      font-size: 14px;
      font-weight: bold;
      color: #6f42c1;
    }
    .btn-tts {
      padding: 4px 8px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-tts.speaking {
      background: #dc3545;
    }
    #ai-text {
      font-size: 13px;
      line-height: 1.5;
      color: #333;
      margin: 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h1>🏋️‍♂️ 체코 (Che-Co)</h1>
    <div class="subtitle">AI 체대 입시 실기 코칭 계산기</div>

    <div class="auth-section">
      <button id="btn-login" class="btn-auth">구글 계정으로 시작하기</button>
      <div id="user-profile" class="user-info" style="display: none;">
        <span id="user-name">사용자님</span>
        <button class="btn-logout" id="btn-logout">로그아웃</button>
      </div>
    </div>

    <div id="main-form" style="display: none;">
      <div class="input-group">
        <label>제자리멀리뛰기 (cm)</label>
        <input type="number" id="input-jump" placeholder="예: 250" />
      </div>
      <div class="input-group">
        <label>10m 왕복달리기 (초)</label>
        <input type="number" step="0.01" id="input-run" placeholder="예: 11.20" />
      </div>
      <div class="input-group">
        <label>배근력 (kg)</label>
        <input type="number" id="input-power" placeholder="예: 140" />
      </div>

      <button class="btn-block btn-save" id="btn-save">💾 기록 저장 (Firestore)</button>
      <button class="btn-block btn-ai" id="btn-ai">🚀 AI 코치 맞춤 피드백 받기</button>
    </div>

    <div class="report-box" id="report-box">
      <div class="report-header">
        <span class="report-title">🤖 AI 코칭 리포트</span>
        <button class="btn-tts" id="btn-tts">🔊 귀로 듣기</button>
      </div>
      <p id="ai-text">AI 코치가 기록을 분석 중입니다...</p>
    </div>
  </div>

  <script type="module">
    // Firebase 정적 CDN 로드
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ⚠️ [필수 고치기 1] 내 Firebase 프로젝트 설정 값을 넣으세요
    const firebaseConfig = {
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // ⚠️ [필수 고치기 2] 내 Gemini AI API 키를 넣으세요
    const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY";

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // DOM 요소 가져오기
    const btnLogin = document.getElementById('btn-login');
    const btnLogout = document.getElementById('btn-logout');
    const userProfile = document.getElementById('user-profile');
    const mainForm = document.getElementById('main-form');
    const userName = document.getElementById('user-name');
    
    const inputJump = document.getElementById('input-jump');
    const inputRun = document.getElementById('input-run');
    const inputPower = document.getElementById('input-power');
    const btnSave = document.getElementById('btn-save');
    const btnAi = document.getElementById('btn-ai');
    
    const reportBox = document.getElementById('report-box');
    const aiText = document.getElementById('ai-text');
    const btnTts = document.getElementById('btn-tts');

    let currentUser = null;

    // 인증 상태 감지 및 Firestore 기존 데이터 로드
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        btnLogin.style.display = 'none';
        userProfile.style.display = 'flex';
        mainForm.style.display = 'block';
        userName.innerText = `🔥 ${user.displayName} 회원님`;
        
        // Firestore에서 기존 기록 가져오기
        const docRef = doc(db, "physical_records", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const data = docSnap.data();
          inputJump.value = data.jump || '';
          inputRun.value = data.run || '';
          inputPower.value = data.power || '';
        }
      } else {
        currentUser = null;
        btnLogin.style.display = 'block';
        userProfile.style.display = 'none';
        mainForm.style.display = 'none';
        reportBox.style.display = 'none';
      }
    });

    // 로그인 / 로그아웃 이벤트
    btnLogin.addEventListener('click', () => signInWithPopup(auth, provider));
    btnLogout.addEventListener('click', () => signOut(auth));

    // Firestore 데이터 저장
    btnSave.addEventListener('click', async () => {
      if (!currentUser) return;
      try {
        await setDoc(doc(db, "physical_records", currentUser.uid), {
          jump: inputJump.value,
          run: inputRun.value,
          power: inputPower.value,
          updatedAt: new Date()
        });
        alert('체력 측정 기록이 Firebase에 안전하게 저장되었습니다!');
      } catch (error) {
        alert('저장 실패: ' + error.message);
      }
    });

    // Gemini 생성형 AI API 연동
    btnAi.addEventListener('click', async () => {
      if (!inputJump.value || !inputRun.value || !inputPower.value) {
        alert('모든 실기 기록을 입력해 주세요.');
        return;
      }

      reportBox.style.display = 'block';
      aiText.innerText = "AI 코치가 기록을 정밀 분석 중입니다. 잠시만 기다려주세요...";
      
      if(window.speechSynthesis.speaking) window.speechSynthesis.cancel(); // 말하고 있으면 멈춤

      const prompt = `너는 베테랑 체대 입시 코치야. 다음 학생의 기록을 만점 기준(제멀 280cm, 10m왕복 11초 컷, 배근력 150kg)과 비교해서 부족한 점과 하체/악력 보강 운동 루틴을 딱 3문장으로 아주 명확하게 격려조로 조언해줘. 
      - 제자리멀리뛰기: ${inputJump.value}cm
      - 10m 왕복달리기: ${inputRun.value}초
      - 배근력: ${inputPower.value}kg`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await response.json();
        const responseText = data.candidates[0].content.parts[0].text;
        aiText.innerText = responseText;
      } catch (error) {
        aiText.innerText = "AI 분석 도중 오류가 발생했습니다. API 키를 확인해 주세요.";
      }
    });

    // Web Speech API 활용 내장 TTS 기능
    btnTts.addEventListener('click', () => {
      const textToSpeak = aiText.innerText;
      if (!textToSpeak || textToSpeak.includes("분석 중입니다")) return;

      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        btnTts.innerText = "🔊 귀로 듣기";
        btnTts.classList.remove('speaking');
        return;
      }

      const utterance = new SpeechSynthesisUtterance(textToSpeak);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;

      utterance.onend = () => {
        btnTts.innerText = "🔊 귀로 듣기";
        btnTts.classList.remove('speaking');
      };

      btnTts.innerText = "⏹️ 음성 중지";
      btnTts.classList.add('speaking');
      window.speechSynthesis.speak(utterance);
    });
  </script>
</body>
</html>
