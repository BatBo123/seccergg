<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 AI 헬스 트레이너</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1, h2 { text-align: center; color: #2c3e50; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
    button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
    button:hover { background-color: #2980b9; }
    .hidden { display: none; }
    .routine-box { background: #e8f6f3; padding: 15px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; line-height: 1.5; }
    .log-list { list-style: none; padding: 0; }
    .log-item { background: #fff; border: 1px solid #eee; margin-bottom: 10px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    #audio-container { margin-top: 15px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <h1>💪 AI 헬스 트레이너</h1>

  <div id="auth-section">
    <h2>로그인</h2>
    <input type="email" id="email" placeholder="이메일 주소">
    <input type="password" id="password" placeholder="비밀번호">
    <button id="login-btn">로그인</button>
    <button id="signup-btn" style="background-color: #2ecc71;">회원가입</button>
  </div>

  <div id="main-section" class="hidden">
    <p id="user-greeting" style="text-align: center; font-weight: bold;"></p>
    <button id="logout-btn" style="background-color: #e74c3c; width: auto; display: block; margin: 0 auto 20px auto;">로그아웃</button>
    <hr>

    <h2>오늘의 운동 세팅</h2>
    <select id="target-muscle">
      <option value="가슴과 삼두">가슴과 삼두</option>
      <option value="등과 이두">등과 이두</option>
      <option value="하체와 어깨">하체와 어깨</option>
      <option value="전신 유산소 및 코어">전신 유산소 및 코어</option>
    </select>
    <select id="time-limit">
      <option value="30분">30분 (빠르고 굵게)</option>
      <option value="50분">50분 (일반적인 루틴)</option>
      <option value="90분">90분 (하드코어)</option>
    </select>
    <button id="generate-btn">AI 루틴 생성하기</button>

    <div id="loading" class="hidden" style="text-align: center; margin-top: 10px;">AI 트레이너가 루틴을 짜는 중입니다... ⏳</div>

    <div id="result-section" class="hidden">
      <div id="routine-output" class="routine-box"></div>
      <button id="tts-btn" style="background-color: #f39c12;">🎧 오디오 코칭 듣기 (TTS)</button>
      <div id="audio-container"></div>
      <button id="save-btn" style="background-color: #9b59b6;">💾 내 운동 일지에 저장</button>
    </div>

    <hr>
    <h2>나의 운동 일지</h2>
    <ul id="log-list" class="log-list"></ul>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // 🛠️ 사용자의 실제 Firebase 프로젝트(batbo-f2f68) 정보 적용
  const firebaseConfig = {
    apiKey: "AIzaSyDR2KhJEnICowvVnk2_aRbFBrlAYQjl_AQ",
    authDomain: "batbo-f2f68.firebaseapp.com",
    databaseURL: "https://batbo-f2f68-default-rtdb.firebaseio.com",
    projectId: "batbo-f2f68",
    storageBucket: "batbo-f2f68.firebasestorage.app",
    messagingSenderId: "58905778365",
    appId: "1:58905778365:web:c3394c57a1b8aeec837fd4",
    measurementId: "G-XRGWG0CHRZ"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // 🛠️ 요청하신 구글 앱스 스크립트 새 URL 적용 완료
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmATAH6IUhByWndfG34O_UwGFm9pdzJrbtOyHNVAAdb5s-IcoGtGwGwR4J_-Doa5E/exec"; 

  // UI 요소 가져오기
  const authSection = document.getElementById('auth-section');
  const mainSection = document.getElementById('main-section');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('login-btn');
  const signupBtn = document.getElementById('signup-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const userGreeting = document.getElementById('user-greeting');
  
  const generateBtn = document.getElementById('generate-btn');
  const loading = document.getElementById('loading');
  const resultSection = document.getElementById('result-section');
  const routineOutput = document.getElementById('routine-output');
  const ttsBtn = document.getElementById('tts-btn');
  const audioContainer = document.getElementById('audio-container');
  const saveBtn = document.getElementById('save-btn');
  const logList = document.getElementById('log-list');

  let currentRoutine = "";
  let currentUserInfo = null;

  // --- [인증 기능] ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserInfo = user;
      authSection.classList.add('hidden');
      mainSection.classList.remove('hidden');
      userGreeting.innerText = `${user.email}님, 오늘도 득근하세요!`;
      loadWorkoutLogs(user.uid);
    } else {
      currentUserInfo = null;
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
    }
  });

  loginBtn.addEventListener('click', () => {
    signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
      .then(() => alert("로그인 성공!"))
      .catch(error => alert("로그인 실패: " + error.message));
  });

  signupBtn.addEventListener('click', () => {
    createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value)
      .then(() => alert("회원가입 성공!"))
      .catch(error => alert("회원가입 실패: " + error.message));
  });

  logoutBtn.addEventListener('click', () => {
    signOut(auth);
  });

  // --- [AI 생성 기능] ---
  generateBtn.addEventListener('click', async () => {
    const muscle = document.getElementById('target-muscle').value;
    const time = document.getElementById('time-limit').value;
    const prompt = `너는 전문 헬스 트레이너야. 사용자가 ${time} 동안 할 수 있는 ${muscle} 운동 루틴을 짜줘. 친근하고 동기부여가 되는 말투로 설명해줘.`;

    loading.classList.remove('hidden');
    resultSection.classList.add('hidden');
    audioContainer.innerHTML = ''; 

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `type=chat&prompt=${encodeURIComponent(prompt)}`
      });
      const data = await response.json();
      currentRoutine = data.result;
      routineOutput.innerText = currentRoutine;
      
      loading.classList.add('hidden');
      resultSection.classList.remove('hidden');
    } catch (error) {
      alert("루틴 생성에 실패했습니다.");
      loading.classList.add('hidden');
    }
  });

  // --- [TTS 오디오 생성 기능] ---
  ttsBtn.addEventListener('click', async () => {
    ttsBtn.innerText = "오디오 생성 중... ⏳";
    ttsBtn.disabled = true;

    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `type=tts&text=${encodeURIComponent(currentRoutine)}`
      });
      const data = await response.json();
      
      const audioTag = `<audio controls autoplay src="data:audio/mp3;base64,${data.audioBase64}"></audio>`;
      audioContainer.innerHTML = audioTag;
      
    } catch (error) {
      alert("오디오 생성에 실패했습니다.");
    } finally {
      ttsBtn.innerText = "🎧 오디오 코칭 듣기 (TTS)";
      ttsBtn.disabled = false;
    }
  });

  // --- [Firebase DB 연동] ---
  saveBtn.addEventListener('click', () => {
    if (!currentUserInfo || !currentRoutine) return;
    
    const logRef = ref(db, `users/${currentUserInfo.uid}/workoutLogs`);
    const newLogRef = push(logRef);
    
    const today = new Date().toLocaleDateString('ko-KR');
    const muscle = document.getElementById('target-muscle').value;

    set(newLogRef, {
      date: today,
      target: muscle,
      routine: currentRoutine
    }).then(() => {
      alert("오늘의 운동 일지가 저장되었습니다!");
    });
  });

  function loadWorkoutLogs(uid) {
    const logRef = ref(db, `users/${uid}/workoutLogs`);
    onValue(logRef, (snapshot) => {
      logList.innerHTML = ''; 
      const data = snapshot.val();
      if (data) {
        const logs = Object.values(data).reverse();
        logs.forEach(log => {
          const li = document.createElement('li');
          li.className = 'log-item';
          li.innerHTML = `<strong>📅 ${log.date} | 목표: ${log.target}</strong><br><span style="font-size:0.9em; color:#555;">${log.routine.substring(0, 50)}...</span>`;
          logList.appendChild(li);
        });
      } else {
        logList.innerHTML = '<li>아직 저장된 일지가 없습니다. 오늘 첫 운동을 시작해보세요!</li>';
      }
    });
  }
</script>
</body>
</html>
